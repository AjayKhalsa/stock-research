services:
  - type: web
    name: stocklens-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # set the value in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.12.0
